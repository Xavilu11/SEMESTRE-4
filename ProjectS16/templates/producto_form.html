{% extends "base.html" %}

{% block title %}Agregar Producto{% endblock %}

{% block content %}
  <h2>Agregar un nuevo producto</h2>
  <form method="POST" action="{{ url_for('add') }}">
      <label for="id">ID:</label>
      <input type="text" name="id" required><br>

      <label for="nombre">Nombre:</label>
      <input type="text" name="nombre" required><br>

      <label for="color">Color:</label>
      <input type="text" name="color"><br>

      <label for="cantidad">Cantidad:</label>
      <input type="number" name="cantidad" required><br>

      <label for="precio">Precio:</label>
      <input type="number" step="0.01" name="precio" required><br>

      <!-- Botón para insertar con SQLite clásico -->
      <button type="submit">Guardar con SQLite clásico</button>
  </form>

  <hr>

  <form method="POST" action="{{ url_for('add_sqlalchemy') }}">
      <!-- Reutilizamos los mismos campos -->
      <label for="id">ID:</label>
      <input type="text" name="id" required><br>

      <label for="nombre">Nombre:</label>
      <input type="text" name="nombre" required><br>

      <label for="color">Color:</label>
      <input type="text" name="color"><br>

      <label for="cantidad">Cantidad:</label>
      <input type="number" name="cantidad" required><br>

      <label for="precio">Precio:</label>
      <input type="number" step="0.01" name="precio" required><br>

      <!-- Botón para insertar con SQLAlchemy -->
      <button type="submit">Guardar con SQLAlchemy (ORM)</button>
  </form>
{% endblock %}
